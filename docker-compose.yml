services:
  # pgAdmin para administrar tu PostgreSQL local
  pgadmin:
    image: dpage/pgadmin4
    container_name: proyecto_taw_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - proyecto-network
    profiles:
      - with-pgadmin

  # Backend de NestJS
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proyecto_taw_backend
    environment:
      # Conexión a tu PostgreSQL LOCAL (en Windows)
      DB_HOST: host.docker.internal # Apunta a tu máquina host
      DB_PORT: 5432 # Puerto de PostgreSQL en tu Windows
      DB_USER: postgres
      DB_PASS: 1234567 # Tu contraseña
      DB_NAME: tesoreria_bd # Tu base de datos
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway" # Necesario para Windows
    networks:
      - proyecto-network
    restart: unless-stopped

  # Frontend (si también está en Docker)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proyecto_taw_frontend
    environment:
      API_URL: http://localhost:3000 # O usa backend:3000 si están en misma red
    ports:
      - "8080:80"
    networks:
      - proyecto-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  proyecto-network:
    driver: bridge
